services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: compliancedesk
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: compliancedesk
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: compliancedesk
      DB_USERNAME: compliancedesk
      DB_PASSWORD: secret
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_FROM_ADDRESS: noreply@compliancedesk.test
      MAIL_FROM_NAME: ComplianceDesk
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    command: >
      sh -c "composer install --no-interaction &&
             php artisan key:generate --force &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  mysql_data:
