# =============================================================================
# SonarCloud — ComplianceDesk
# Organisation / projectKey déjà configurés pour suufiaane13
# Doc : https://docs.sonarcloud.io/
# =============================================================================

sonar.projectKey=suufiaane13_ComplianceDesk
sonar.organization=suufiaane13
sonar.projectName=ComplianceDesk

# Hébergé sur SonarCloud (ne pas changer)
sonar.host.url=https://sonarcloud.io

# Code source analysé
sonar.sources=backend/app,backend/routes,frontend/src
sonar.sourceEncoding=UTF-8

# Tests (détection des fichiers de test, pas obligatoire pour la 1re analyse)
sonar.tests=backend/tests
sonar.test.inclusions=backend/tests/**/*.php

# Exclusions (dépendances, builds, assets stage, stockage Laravel)
sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/public/build/**,\
  **/storage/**,\
  **/bootstrap/cache/**,\
  **/coverage/**,\
  others/**,\
  **/*.min.js,\
  frontend/src/**/*.css

# Couverture PHP (générée via php artisan test --coverage-clover=coverage.xml)
sonar.php.coverage.reportPaths=backend/coverage.xml
# Frontend hors coverage pour l’instant (pas de rapport Vitest) — sinon « new code » tombe à ~5 %
sonar.coverage.exclusions=frontend/src/**/*,backend/routes/**/*
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info


